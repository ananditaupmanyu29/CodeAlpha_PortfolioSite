<body>

<header>
    <nav class="navbar">
        <div class="logo">Portfolio</div>

</header>
        <div class="form-container">
            <h2>Personal Information & Field Required</h2>
            <form>
                <!-- Personal Information Section -->
                 <label for="fullName">Full Name</label>
                 <input type="text" id="fullName" name="fullName" required>
                 <label for="email">Email</label>
                 <input type="email" id="email" name="email" required>
                 <label for="phone">Phone Number</label>
                 <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
                 <label for="address">Address</label>
                 <input type="text" id="address" name="address" required>
                <!-- Qualifications Section -->
                <label for="education">Education Required</label>
                <select id="education" name="education" required>
                    <option value="">-- Select --</option>
                    <option value="High School">High School</option>
                    <option value="Diploma">Diploma</option>
                    <option value="Bachelor's">Bachelor's</option>
                    <option value="Master's">Master's</option>
                    <option value="PhD">PhD</option>
                </select>
                <label for="field">Field of Study Required</label>
                <input type="text" id="field" name="field" required>
                <label for="skills">Skills Required</label>
                <input type="text" id="skills" name="skills" placeholder="e.g., Programming, Communication"required>
                <label for="experience">Years of Experience Required</label>
                <input type="number" id="experience" name="experience" min="0" required>
                <!-- Buttons -->
                 <div class="button-group">
                    <button type="submit" class="submit-btn">Submit</button>
                    <button type="reset" class="reset-btn">Reset</button>
                </div>
            </form>
        </div>
        <footer>
            Your Details | Designed by Anandita Upmanyu
        </footer>
    </body>
</html>
